name: WeChat News Daily

# 每天采集公众号增量 + 生成热点资讯（news 表）。
# 重任务（限频 API 多次调用），跑在 GitHub Actions 而非 Vercel（函数 5 分钟上限不够）。
on:
  schedule:
    # 每天 UTC 14:07（北京 22:07）。只采当天新文，错开整点（GitHub 整点排队最堵、延迟最久）。
    - cron: '7 14 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '仅生成不写库（true=只输出）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      days:
        description: 'news 从库里取最近几天聚类热点（默认 3）'
        required: false
        default: '3'

jobs:
  news:
    name: Crawl Today + Generate Hot News
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Crawl today's new articles
        env:
          CIMIDATA_APP_ID: ${{ secrets.CIMIDATA_APP_ID }}
          CIMIDATA_APP_SECRET: ${{ secrets.CIMIDATA_APP_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/wechat/1-crawl.mjs --today

      - name: Generate hot news (read recent days from DB)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/wechat/news.mjs --days ${{ github.event.inputs.days || '3' }} ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      # 写库后主动刷新 ISR：news 直写 Supabase 不触发 Vercel 重部署，
      # sitemap.xml 等低流量 ISR 页不会自更，调 revalidate 让新文章当天进 sitemap。
      - name: Revalidate sitemap + news listings
        if: github.event.inputs.dry_run != 'true'
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://aiskillnav.com' }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          curl -fsSL -X POST "$SITE_URL/api/revalidate" \
            -H "X-Revalidate-Secret: $REVALIDATE_SECRET" \
            -H 'Content-Type: application/json' \
            -d '{"paths":["/sitemap.xml","/news","/en/news"]}' \
            || echo "::warning::revalidate 调用失败（检查 Vercel + GitHub 的 REVALIDATE_SECRET 是否一致），不阻塞日更"

      - name: Upload data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-data-${{ github.run_id }}
          path: scripts/wechat/data/*.json
          retention-days: 14
          if-no-files-found: ignore
