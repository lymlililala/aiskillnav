name: WeChat Evergreen Weekly

# 每周采集 + 合成常青教程(tutorials) + 提炼应用场景(usecases)。
# 常青内容低频产出，避免天天批量导致注水/重复被搜索引擎降权。
on:
  schedule:
    # 每周一 UTC 05:13（北京 13:13）
    - cron: '13 5 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '仅生成不写库（true=只输出）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      threshold:
        description: 'tutorials 自评分阈值（默认 75）'
        required: false
        default: '75'

jobs:
  evergreen:
    name: Synthesize Tutorials + Usecases
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      CIMIDATA_APP_ID: ${{ secrets.CIMIDATA_APP_ID }}
      CIMIDATA_APP_SECRET: ${{ secrets.CIMIDATA_APP_SECRET }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DRY: ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      # 不再爬取：直接读日更已累积进 wx_sources 的最近 14 天源文
      - name: Cluster topics (from DB)
        run: node scripts/wechat/2-cluster.mjs --days 14

      - name: Synthesize tutorials
        run: node scripts/wechat/3-synthesize.mjs --days 14

      - name: Publish tutorials (gate + self-score)
        run: node scripts/wechat/4-publish.mjs --threshold ${{ github.event.inputs.threshold || '75' }} ${{ env.DRY }}

      - name: Generate usecases (from DB)
        run: node scripts/wechat/usecases.mjs --days 14 ${{ env.DRY }}

      # 写库后触发 Vercel 重新部署刷新 sitemap：revalidatePath 对 sitemap.xml 无效，
      # 用 Deploy Hook 可靠重建（与日更同款）。
      - name: Trigger Vercel redeploy (refresh sitemap)
        if: github.event.inputs.dry_run != 'true'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK" \
            || echo "::warning::Deploy Hook 调用失败（检查 GitHub secret VERCEL_DEPLOY_HOOK），不阻塞周更"

      - name: Upload data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evergreen-data-${{ github.run_id }}
          path: scripts/wechat/data/*.json
          retention-days: 14
          if-no-files-found: ignore
