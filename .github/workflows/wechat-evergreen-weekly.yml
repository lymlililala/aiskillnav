name: WeChat Evergreen Weekly

# 每周采集 + 合成常青教程(tutorials) + 提炼应用场景(usecases)。
# 常青内容低频产出，避免天天批量导致注水/重复被搜索引擎降权。
on:
  schedule:
    # 每周一 UTC 05:13（北京 13:13）
    - cron: '13 5 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '仅生成不写库（true=只输出）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      threshold:
        description: 'tutorials 自评分阈值（默认 75）'
        required: false
        default: '75'

jobs:
  evergreen:
    name: Synthesize Tutorials + Usecases
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      CIMIDATA_APP_ID: ${{ secrets.CIMIDATA_APP_ID }}
      CIMIDATA_APP_SECRET: ${{ secrets.CIMIDATA_APP_SECRET }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DRY: ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Compute since date (14 days ago)
        id: dates
        run: echo "since=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Crawl incremental
        run: node scripts/wechat/1-crawl.mjs --since ${{ steps.dates.outputs.since }} --max-pages 3

      - name: Cluster topics
        run: node scripts/wechat/2-cluster.mjs

      - name: Synthesize tutorials
        run: node scripts/wechat/3-synthesize.mjs

      - name: Publish tutorials (gate + self-score)
        run: node scripts/wechat/4-publish.mjs --threshold ${{ github.event.inputs.threshold || '75' }} ${{ env.DRY }}

      - name: Generate usecases
        run: node scripts/wechat/usecases.mjs ${{ env.DRY }}

      - name: Upload data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evergreen-data-${{ github.run_id }}
          path: scripts/wechat/data/*.json
          retention-days: 14
